<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Wallpaper Community</title>
    
    <!-- Preload critical resources for speed -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://udaniwuafagvftgsnslb.supabase.co">
    <link rel="preload" href="style.css" as="style">
    <link rel="preload" href="app.js" as="script">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Live Wallpaper Community</h1>
            <nav>
                <button id="uploadBtn" class="btn-primary">Upload Wallpaper</button>
                <button id="loginBtn" class="btn-secondary">Login</button>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h2>Share Your Live Wallpapers</h2>
                <p>Discover and share amazing MP4 live wallpapers with the community</p>
            </div>
        </section>

        <section class="filters">
            <div class="container">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="nature">Nature</button>
                    <button class="filter-btn" data-filter="abstract">Abstract</button>
                    <button class="filter-btn" data-filter="anime">Anime</button>
                    <button class="filter-btn" data-filter="game">Game</button>
                </div>
            </div>
        </section>

        <section class="wallpaper-grid">
            <div class="container">
                <div id="wallpaperContainer" class="grid">
                    <!-- Wallpapers will be loaded here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Upload Live Wallpaper</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="nature">Nature</option>
                        <option value="abstract">Abstract</option>
                        <option value="anime">Anime</option>
                        <option value="game">Game</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="videoFile">Video File (MP4 or WebM)</label>
                    <input type="file" id="videoFile" name="videoFile" accept="video/mp4,video/webm" required>
                </div>
                <div class="form-group">
                    <label for="compressionPreset">Compression Preset</label>
                    <select id="compressionPreset">
                        <option value="low">Low Compression (5-10MB) - Best Quality</option>
                        <option value="medium" selected>Medium Compression (15-25MB) - Balanced</option>
                        <option value="high">High Compression (30-50MB) - Small Size</option>
                    </select>
                    <small style="color: #64748b;">Lower compression = better quality, larger file</small>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="skipConversion"> Skip WebM conversion (upload original MP4)
                    </label>
                    <small style="color: #64748b;">Check this if conversion fails or you want faster upload</small>
                </div>
                <div class="form-group">
                    <label for="thumbnail">Thumbnail (optional)</label>
                    <input type="file" id="thumbnail" name="thumbnail" accept="image/*">
                </div>
                <button type="submit" class="btn-primary">Upload</button>
            </form>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content video-modal">
            <span class="close">&times;</span>
            <video id="videoPlayer" controls autoplay loop>
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="video-info">
                <h3 id="videoTitle"></h3>
                <p id="videoCategory"></p>
                <div class="video-actions">
                    <button class="btn-primary" id="downloadBtn">Download</button>
                    <button class="btn-secondary" id="shareBtn">Share Link</button>
                    <button class="btn-secondary" id="likeBtn">Like</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <p class="auth-switch">Don't have an account? <a href="#" id="switchToSignup">Sign up</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
